spring.application.name=focus
spring.profiles.active=dev

# MySQL (valores por defecto para XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/focus
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Requerido: Hibernate 7.x falla al auto-detectar dialecto con MySQL 8 (error "Unknown column RESERVED")
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (en prod usar variables de entorno: FOCUS_JWT_SECRET, FOCUS_JWT_EXPIRATION_MS)
focus.jwt.secret=${FOCUS_JWT_SECRET:focus-secret-key-minimo-256-bits-para-hmac-sha256-seguro}
focus.jwt.expiration-ms=${FOCUS_JWT_EXPIRATION_MS:86400000}
