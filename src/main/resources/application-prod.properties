# Producción: inyectar via variables de entorno en Easypanel/VPS
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/focus}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
# Primera vez en Easypanel: crear tablas con SPRING_JPA_HIBERNATE_DDL_AUTO=update; luego quitar o usar validate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS: orígenes permitidos (dominio del frontend si se sirve aparte). En mismo origen dejar vacío o *
focus.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# JWT en producción: definir FOCUS_JWT_SECRET en el VPS (mín. 256 bits)
focus.jwt.secret=${FOCUS_JWT_SECRET:}
focus.jwt.expiration-ms=${FOCUS_JWT_EXPIRATION_MS:86400000}

# Logs: nivel INFO o WARN en producción
logging.level.root=WARN
logging.level.com.focus=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# Actuator: solo health para monitoreo (ya definido en application.properties)
